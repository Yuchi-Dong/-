# ══════════════════════════════════════════════════════════════════
# 锡林郭勒云盘 v2.0 — Nginx 生产配置
# ══════════════════════════════════════════════════════════════════

# 速率限制区（防暴力破解、防 DDoS）
limit_req_zone  $binary_remote_addr zone=login_zone:10m  rate=10r/m;
limit_req_zone  $binary_remote_addr zone=api_zone:10m    rate=300r/m;
limit_req_zone  $binary_remote_addr zone=upload_zone:10m rate=60r/m;

server {
    listen 80;
    server_name your-domain.com;

    # HTTP → HTTPS 强制跳转（生产环境启用）
    # return 301 https://$server_name$request_uri;

    # 开发/内网环境不强制 HTTPS，注释掉上面这行，保留以下配置
    include /etc/nginx/conf.d/secftp_locations.conf;
}

# HTTPS（生产环境取消注释）
# server {
#     listen 443 ssl http2;
#     server_name your-domain.com;
#
#     ssl_certificate     /etc/nginx/ssl/cert.pem;
#     ssl_certificate_key /etc/nginx/ssl/cert.key;
#     ssl_protocols       TLSv1.2 TLSv1.3;
#     ssl_ciphers         HIGH:!aNULL:!MD5;
#     ssl_session_cache   shared:SSL:10m;
#
#     include /etc/nginx/conf.d/secftp_locations.conf;
# }

# 公共 location 配置（单独文件方便 HTTP/HTTPS 共享）
# 将以下内容保存到 /etc/nginx/conf.d/secftp_locations.conf

# ── 路由规则 ────────────────────────────────────────────────────
# （直接写在 server {} 内，或用 include）

    client_max_body_size    0;     # 不限制上传大小（由应用层控制）
    client_body_timeout     300s;  # 大文件上传超时
    proxy_read_timeout      300s;
    proxy_connect_timeout   10s;

    # 安全响应头
    add_header X-Frame-Options        "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection       "1; mode=block" always;

    # 登录接口速率限制
    location /api/auth/login {
        limit_req zone=login_zone burst=5 nodelay;
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 上传接口速率限制
    location ~ ^/api/upload/ {
        limit_req zone=upload_zone burst=20 nodelay;
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_request_buffering off;  # 流式上传，不缓冲
    }

    # WebDAV（特殊处理 PROPFIND 等非标准方法）
    location /webdav/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Destination $http_destination;
        proxy_request_buffering off;
        # 允许所有 WebDAV 方法
        proxy_method       $request_method;
        client_max_body_size 0;
    }

    # 其他 API
    location /api/ {
        limit_req zone=api_zone burst=50 nodelay;
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 文件下载（头像/文件）
    location ~ ^/(file|avatar|s)/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_buffering    off;  # 流式传输大文件
    }

    # 健康检查
    location /health {
        proxy_pass http://127.0.0.1:8080;
        access_log off;
    }

    # 静态资源（Vue3 构建产物）
    location / {
        root   /opt/secftp/static;
        index  index.html;
        # Vue Router history mode SPA fallback
        try_files $uri $uri/ /index.html;
        # 静态资源缓存
        location ~* \.(js|css|woff2?|ttf|eot|svg|png|ico)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 5;
}
